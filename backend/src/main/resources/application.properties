spring.application.name=backend

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/podpal?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.backend.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 服务器配置
server.port=8080

# 文件上传配置
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# WhisperX 配置
whisperx.python.path=python
whisperx.script.path=scripts/whisperx_transcribe.py
whisperx.model=large-v2
whisperx.device=cpu
whisperx.compute.type=float32

# Python 配置
python.path=python

# 情感分析配置
sentiment.script.path=scripts/multimodal_sentiment.py

# DeepSeek API 配置
deepseek.api.key=your_deepseek_api_key
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# 向量提取配置
vector.extraction.script=scripts/vector_extraction.py

# Milvus 配置
milvus.host=localhost
milvus.port=19530
milvus.manager.script=scripts/milvus_manager.py
